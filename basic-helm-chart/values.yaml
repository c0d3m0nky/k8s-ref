
# -- Sets how many replicas of the application to run
replicaCount: 1

image:
  # -- Sets the container image repository to pull from.
  repository: someRepo/someDotNetApp
  # -- Sets the pull policy for images. [More details](https://kubernetes.io/docs/concepts/containers/images/#image-pull-policy)
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: latest

# -- This is for the secrets for pulling an image from a private repository. [More details](https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/)
# @default -- ~empty
imagePullSecrets: []

# -- Overrides the chart name
# @default -- ~empty
nameOverride: ""

# -- Overrides the chart full name
# @default -- ~empty
fullnameOverride: ""

# -- This section builds out the service account. [More details](https://kubernetes.io/docs/concepts/security/service-accounts/)
# @default -- Creates and automounts a service account with the same name as the release name.
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# -- Annotations to be added to all pods
# @default -- ~empty
podAnnotations: {}

# -- Labels to be added to all pods
# @default -- ~empty
podLabels: {}

# -- Sets the security context for all pods. [More details](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/)
# @default -- ~empty
podSecurityContext: {}

# -- Sets the security context for all containers. [More details](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/)
# @default -- ~empty
securityContext: {}

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  # HTTPRoute enabled.
  enabled: false
  # HTTPRoute annotations.
  annotations: {}
  # Which Gateways this Route is attached to.
  parentRefs:
  - name: gateway
    sectionName: http
    # namespace: default
  # Hostnames matching HTTP header.
  hostnames:
  - chart-example.local
  # List of rules and filters applied.
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /headers
  #   filters:
  #   - type: RequestHeaderModifier
  #     requestHeaderModifier:
  #       set:
  #       - name: My-Overwrite-Header
  #         value: this-is-the-only-value
  #       remove:
  #       - User-Agent
  # - matches:
  #   - path:
  #       type: PathPrefix
  #       value: /echo
  #     headers:
  #     - name: version
  #       value: v2

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

###
### Application Settings
###

appSettings:
  ConnectionStrings:
    # -- Sets the Postgres connection string
    # @default -- ~empty
    PostgresContext: 
  # -- Sets the port the application listens on
  httpsPort: 5443
  # -- This and example of how a map/list would look if you leave the automatic default generation
  someMap:
    someNestedValue: ""
    listInMap:
      - item1
      - item2
    mapInMap: {}